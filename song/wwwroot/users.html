<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>user CRUD</title>
    <link rel="stylesheet" href="./css/site.css">
    <style>
        #editForm {
            display: none;
            margin-top: 20px;
        }
        
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 8px;
        }
        
        th {
            background-color: #eee;
        }
    </style>
</head>

<body>

     <script>
        
        const token = localStorage.getItem("token");
        console.log("token:", token);
        console.log("path:", window.location.pathname);

        if (token == null) {
            window.location.href = "login.html";
       }      
    </script>

    <h1>ניהול משתמשים</h1>

    <h3>הוסף משתמש חדש</h3>
    <form onsubmit="addItem(); return false;">
        <input type="text" id="add-name" placeholder="שם משתמש" required>
        <input type="number" id="add-age" placeholder="גיל" required>
        <select id="add-role">
            <option value="user">משתמש</option>
            <option value="admin">מנהל</option>
        </select>
        <input type="submit" value="הוסף">
    </form>

    <div id="editForm">
        <h3>Edit User</h3>
        <form onsubmit="updateItem(); return false;">
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-name" placeholder="שם משתמש" required>
            <input type="number" id="edit-age" placeholder="גיל" required>
            <select id="edit-role">
                <option value="user">משתמש</option>
                <option value="admin">מנהל</option>
            </select>
            <input type="submit" value="שמור">
            <button type="button" onclick="closeInput()">בטל</button>
        </form>
    </div>

    <p id="counter"></p>

    <table>
        <thead>
            <tr>
                <th>שם</th>
                <th>גיל</th>
                <th>תפקיד</th>
                <th>עריכה</th>
                <th>מחיקה</th>
            </tr>
        </thead>
        <tbody id="user"></tbody>
    </table>
    <button onclick="location.href='index.html'">
        לחזור לדף השירים
    </button>

    <script src="./js/user.js"></script>
</body>

</html>
